services:
  postgres:
    image: postgres:17-alpine
    container_name: trove-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: trove
      POSTGRES_PASSWORD: trove_dev_password
      POSTGRES_DB: trove
    ports:
      - '5432:5432'
    volumes:
      - trove_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U trove -d trove']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  trove_pgdata:
